# .github/workflows/build-and-deploy.yml
name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Inject DISPATCH_TOKEN
        run: |
          sed -i "s|'\${{ secrets.DISPATCH_TOKEN }}'|'${{ secrets.DISPATCH_TOKEN }}'|g" index.html
      
      - name: Deploy to GitHub Pages (or your host)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
